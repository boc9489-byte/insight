metrics:
  - name: GMV
    description: 全称Gross Merchandise Value，表示所有订单的成交金额总和，即应付金额合计
    relevant_columns:
      - dwd_fact_trade_order_detail_di.payable_amount
    alias:
      - 成交总额
      - 订单总额
      - 交易额
      - GMV
  - name: 实付GMV
    description: 用户实际支付的金额总和
    relevant_columns:
      - dwd_fact_trade_order_detail_di.paid_amount
    alias:
      - 实付金额
      - 实际成交额
      - 实收金额
  - name: 订单量
    description: 订单数量统计，去重后的订单数
    relevant_columns:
      - dwd_fact_trade_order_detail_di.order_id
    alias:
      - 订单数
      - 订单笔数
  - name: 销量
    description: 商品销售件数总和
    relevant_columns:
      - dwd_fact_trade_order_detail_di.sku_num
    alias:
      - 销售件数
      - 销售数量
      - 售卖件数
  - name: 客单价
    description: 平均每个订单的金额，GMV除以订单量
    relevant_columns:
      - dwd_fact_trade_order_detail_di.payable_amount
      - dwd_fact_trade_order_detail_di.order_id
    alias:
      - 平均订单金额
      - 笔单价
      - AOV
  - name: 退款金额
    description: 退款成功的金额总和
    relevant_columns:
      - dwd_fact_trade_refund_detail_di.refund_success_amount
    alias:
      - 退款总额
      - 退款成功金额
  - name: 退款订单数
    description: 发生退款的订单数量
    relevant_columns:
      - dwd_fact_trade_refund_detail_di.order_id
    alias:
      - 退款笔数
  - name: 加购次数
    description: 用户加购行为的次数统计
    relevant_columns:
      - dwd_fact_interaction_cart_add_di.cart_add_id
    alias:
      - 加购量
      - 加入购物车次数
  - name: 加购商品数
    description: 加购的商品件数总和
    relevant_columns:
      - dwd_fact_interaction_cart_add_di.add_sku_num
    alias:
      - 加购件数
  - name: 收藏次数
    description: 用户收藏商品或店铺的次数
    relevant_columns:
      - dwd_fact_interaction_favor_add_di.favor_add_id
    alias:
      - 收藏量
  - name: 搜索次数
    description: 用户发起搜索的次数统计
    relevant_columns:
      - dwd_fact_traffic_search_di.search_detail_id
    alias:
      - 搜索量
      - 搜索PV
  - name: 页面浏览量
    description: 页面被访问的总次数
    relevant_columns:
      - dwd_fact_traffic_page_view_di.page_view_id
    alias:
      - PV
      - 浏览量
      - 访问量
  - name: 平均停留时长
    description: 用户在页面上停留的平均秒数
    relevant_columns:
      - dwd_fact_traffic_page_view_di.stay_duration_sec
    alias:
      - 平均停留时间
  - name: 好评率
    description: 4-5分评价占所有评价的比例
    relevant_columns:
      - dwd_fact_service_comment_detail_di.comment_level
    alias:
      - 好评比例
  - name: 平均评分
    description: 用户评价的平均分数
    relevant_columns:
      - dwd_fact_service_comment_detail_di.comment_level
    alias:
      - 平均星级
      - 综合评分
  - name: 支付金额
    description: 用户支付成功的总金额
    relevant_columns:
      - dwd_fact_trade_pay_detail_di.total_pay_amount
    alias:
      - 支付总额
      - 付款金额
  - name: 支付订单数
    description: 支付成功的订单数量
    relevant_columns:
      - dwd_fact_trade_pay_detail_di.order_id
    alias:
      - 支付笔数
  - name: 发货订单数
    description: 已发货的订单数量
    relevant_columns:
      - dwd_fact_trade_delivery_detail_di.order_id
    alias:
      - 发货笔数
  - name: 库存变动量
    description: 库存数量的变动统计
    relevant_columns:
      - dwd_fact_inventory_change_di.change_qty
    alias:
      - 库存变化量
  - name: 活动优惠金额
    description: 促销活动在订单中优惠的总金额
    relevant_columns:
      - dwd_fact_trade_order_detail_di.activity_discount_amount
      - dwd_fact_trade_order_detail_activity_di.promotion_discount_amount
    alias:
      - 促销优惠
      - 活动减免
  - name: 优惠券优惠金额
    description: 优惠券在订单中抵扣的总金额
    relevant_columns:
      - dwd_fact_trade_order_detail_di.coupon_discount_amount
      - dwd_fact_trade_order_detail_coupon_di.coupon_discount_amount
    alias:
      - 券优惠
      - 优惠券抵扣
